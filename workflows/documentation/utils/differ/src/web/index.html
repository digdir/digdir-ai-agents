<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dokumentasjonsgjennomgang</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Monaco Editor from CDN -->
  <link rel="stylesheet" data-name="vs/editor/editor.main"
        href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
  <!-- Marked for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1>Dokumentasjonsgjennomgang</h1>
      <span class="session-info" id="sessionInfo"></span>
    </div>
    <div class="header-right">
      <span class="round-badge" id="roundBadge">Runde 1</span>
      <button class="btn btn-secondary" id="toggleViewBtn">Bytt visning</button>
    </div>
  </header>

  <main class="main-content">
    <!-- View mode: 4 columns for ultrawide, 2 columns for normal -->
    <div class="columns-container" id="columnsContainer">
      <!-- Column 1: Old Norwegian -->
      <section class="column column-old-nb" id="colOldNb">
        <div class="column-header">
          <h2>Norsk (forrige)</h2>
          <span class="similarity-badge" id="nbSimilarity"></span>
        </div>
        <div class="column-content" id="oldNbContent">
          <div class="markdown-view" id="oldNbMarkdown"></div>
        </div>
      </section>

      <!-- Column 2: New Norwegian (editable) -->
      <section class="column column-new-nb" id="colNewNb">
        <div class="column-header">
          <h2>Norsk (ny)</h2>
          <button class="btn btn-small" id="editNbBtn">Rediger</button>
        </div>
        <div class="column-content" id="newNbContent">
          <div class="markdown-view" id="newNbMarkdown"></div>
          <div class="editor-container hidden" id="nbEditorContainer"></div>
        </div>
      </section>

      <!-- Column 3: New English (editable) -->
      <section class="column column-new-en" id="colNewEn">
        <div class="column-header">
          <h2>Engelsk (ny)</h2>
          <button class="btn btn-small" id="editEnBtn">Rediger</button>
        </div>
        <div class="column-content" id="newEnContent">
          <div class="markdown-view" id="newEnMarkdown"></div>
          <div class="editor-container hidden" id="enEditorContainer"></div>
        </div>
      </section>

      <!-- Column 4: Old English -->
      <section class="column column-old-en" id="colOldEn">
        <div class="column-header">
          <h2>Engelsk (forrige)</h2>
          <span class="similarity-badge" id="enSimilarity"></span>
        </div>
        <div class="column-content" id="oldEnContent">
          <div class="markdown-view" id="oldEnMarkdown"></div>
        </div>
      </section>
    </div>

    <!-- Comments panel (collapsible) -->
    <aside class="comments-panel" id="commentsPanel">
      <div class="comments-header">
        <h3>Tilbakemelding <span id="commentCount">(0)</span></h3>
        <button class="btn btn-small" id="toggleCommentsBtn">Skjul</button>
      </div>
      <div class="comments-list" id="commentsList"></div>
      <div class="comment-input">
        <textarea id="newComment" placeholder="Skriv tilbakemelding her (brukes ved avvisning)..."></textarea>
        <button class="btn btn-secondary" id="addCommentBtn">Legg til notat</button>
      </div>
    </aside>
  </main>

  <footer class="app-footer">
    <div class="footer-left">
      <span class="file-path" id="nbFilePath"></span>
      <span class="file-path" id="enFilePath"></span>
    </div>
    <div class="footer-right">
      <button class="btn btn-danger" id="rejectBtn">Avvis</button>
      <button class="btn btn-primary" id="approveBtn">Godkjenn</button>
    </div>
  </footer>

  <!-- Loading overlay -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p>Laster...</p>
  </div>

  <!-- Monaco Editor loader -->
  <script>
    var require = { paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.nls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.js"></script>

  <script type="module" src="app.js"></script>
</body>
</html>
